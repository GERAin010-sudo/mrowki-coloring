# /etc/nginx/sites-available/crm.mrowki-coloring.pl
# CRM reverse proxy with HTTPS + optional IP allowlist

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name crm.mrowki-coloring.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — CRM (protected: auth + optional IP allowlist)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.mrowki-coloring.pl;

    ssl_certificate     /etc/letsencrypt/live/crm.mrowki-coloring.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.mrowki-coloring.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Allow up to 50MB uploads
    client_max_body_size 50M;

    # ── Public endpoints (for the static site) ──
    # No IP allowlist — these are read-only public APIs + uploads
    location /api/public/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Protected CRM (admin panel + private API) ──
    # Uncomment IP allowlist to restrict further:
    # allow 85.231.45.67;    # home IP
    # allow 92.15.23.11;     # office IP
    # deny all;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
