version: '3.9'

# Mrówki Coloring — full stack on one VM
# Run on openclaw2: docker compose up -d
#
# Access:
#   • From outside: https://crm.mrowki-coloring.pl  (configure DNS + Caddy/nginx)
#   • From inside (LAN): http://<vm-ip>:8080  (CRM)  /  http://<vm-ip>:8081 (site)
#   • Direct on the host: localhost:8080 + localhost:8081

services:

  # ── CRM (Node.js + SQLite + Telegram bot) ──
  crm:
    build: ../crm
    container_name: mrowki-crm
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      - DB_PATH=/data/crm.db
      - UPLOADS_DIR=/data/uploads
    volumes:
      - crm_data:/data
    env_file:
      - ./crm.env
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/login.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Static site (nginx serving site/) ──
  site:
    image: nginx:alpine
    container_name: mrowki-site
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ./site-nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Caddy: HTTPS + reverse proxy (auto Let's Encrypt) ──
  # Only enable in production with public DNS pointing here.
  # Uncomment when ready:
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: mrowki-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config

volumes:
  crm_data:
  caddy_data:
  caddy_config:
