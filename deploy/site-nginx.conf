# /etc/nginx/sites-available/mrowki-coloring.pl
# Public static site (alternative: deploy site/ to Vercel/Netlify instead)

server {
    listen 80;
    listen [::]:80;
    server_name mrowki-coloring.pl www.mrowki-coloring.pl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://mrowki-coloring.pl$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mrowki-coloring.pl;
    ssl_certificate     /etc/letsencrypt/live/mrowki-coloring.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrowki-coloring.pl/privkey.pem;
    return 301 https://mrowki-coloring.pl$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mrowki-coloring.pl;

    ssl_certificate     /etc/letsencrypt/live/mrowki-coloring.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrowki-coloring.pl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/mrowki-site;   # path to the site/ folder
    index index.html;

    # SPA-ish: fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|webp|gif|css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
